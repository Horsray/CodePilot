<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodePilot Premium UI</title>
<style>
/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Deep, rich colors for premium feel */
  --bg-main: #0f0f10;
  --bg-secondary: #18181b;
  --bg-tertiary: #27272a;
  --bg-elevated: #2a2a2e;
  --bg-hover: #323238;
  
  /* Text hierarchy */
  --text-primary: #fafafa;
  --text-secondary: #a1a1aa;
  --text-tertiary: #71717a;
  --text-disabled: #52525b;
  
  /* Accent - rich violet */
  --accent-primary: #8b5cf6;
  --accent-secondary: #a78bfa;
  --accent-glow: rgba(139, 92, 246, 0.4);
  
  /* Semantic */
  --success: #22c55e;
  --warning: #f59e0b;
  --error: #ef4444;
  
  /* Borders */
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.1);
  --border-hover: rgba(255,255,255,0.15);
  
  /* Shadows - multiple layers for depth */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 30px var(--accent-glow);
  
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
  --space-3xl: 32px;
  
  /* Radii */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  
  /* Transitions */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Base */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  background: var(--bg-main);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

.app-container {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Glass reflection effect on sidebar */
.sidebar::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 200px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
  pointer-events: none;
}

.sidebar-header {
  padding: var(--space-xl);
  border-bottom: 1px solid var(--border-subtle);
}

.logo {
  display: flex;
  align-items: center;
  gap: var(--space-md);
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent-primary) 0%, #6366f1 100%);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  color: white;
  box-shadow: var(--shadow-md), 0 0 20px rgba(139, 92, 246, 0.3);
}

.logo-text {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
}

/* New Chat Button */
.new-chat-btn {
  margin: var(--space-lg);
  padding: var(--space-md) var(--space-xl);
  background: linear-gradient(135deg, var(--accent-primary) 0%, #6366f1 100%);
  border: none;
  border-radius: var(--radius-md);
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s var(--ease-out);
  box-shadow: var(--shadow-md), 0 0 20px rgba(139, 92, 246, 0.25);
  position: relative;
  overflow: hidden;
}

.new-chat-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.new-chat-btn:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-lg), 0 0 30px rgba(139, 92, 246, 0.4);
}

.new-chat-btn:hover::before {
  left: 100%;
}

.new-chat-btn:active {
  transform: translateY(0);
}

/* Chat List */
.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-sm);
}

.chat-list::-webkit-scrollbar {
  width: 4px;
}

.chat-list::-webkit-scrollbar-track {
  background: transparent;
}

.chat-list::-webkit-scrollbar-thumb {
  background: var(--bg-hover);
  border-radius: 2px;
}

.chat-item {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.15s var(--ease-out);
  margin-bottom: 2px;
}

.chat-item:hover {
  background: var(--bg-tertiary);
}

.chat-item.active {
  background: linear-gradient(135deg, rgba(139,92,246,0.15) 0%, rgba(99,102,241,0.1) 100%);
  border: 1px solid rgba(139,92,246,0.2);
}

.chat-item-icon {
  width: 28px;
  height: 28px;
  background: var(--bg-tertiary);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  transition: all 0.15s;
}

.chat-item.active .chat-item-icon {
  background: linear-gradient(135deg, var(--accent-primary), #6366f1);
  box-shadow: 0 0 12px rgba(139, 92, 246, 0.3);
}

.chat-item-text {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.15s;
}

.chat-item:hover .chat-item-text {
  color: var(--text-primary);
}

.chat-item.active .chat-item-text {
  color: var(--text-primary);
  font-weight: 500;
}

/* Sidebar Footer */
.sidebar-footer {
  padding: var(--space-lg);
  border-top: 1px solid var(--border-subtle);
}

.model-selector {
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  background: var(--bg-tertiary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.2s;
}

.model-selector:hover {
  background: var(--bg-hover);
  border-color: var(--border-hover);
}

.model-status {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
}

.model-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
}

.model-arrow {
  font-size: 10px;
  color: var(--text-tertiary);
}

/* ===== MAIN CONTENT ===== */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
  position: relative;
}

/* Subtle gradient overlay */
.main-content::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 300px;
  background: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.08) 0%, transparent 70%);
  pointer-events: none;
}

/* Top Bar */
.top-bar {
  height: 56px;
  padding: 0 var(--space-2xl);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
  background: rgba(15,15,16,0.8);
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 10;
}

.top-bar-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.2px;
}

.top-bar-actions {
  display: flex;
  gap: var(--space-sm);
}

.top-bar-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.top-bar-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-primary);
}

/* Messages Area */
.messages-area {
  flex: 1;
  padding: var(--space-3xl) var(--space-2xl);
  overflow-y: auto;
  position: relative;
}

.messages-area::-webkit-scrollbar {
  width: 6px;
}

.messages-area::-webkit-scrollbar-track {
  background: transparent;
}

.messages-area::-webkit-scrollbar-thumb {
  background: var(--bg-tertiary);
  border-radius: 3px;
}

/* Welcome State */
.welcome-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  animation: fadeIn 0.5s var(--ease-out);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, var(--accent-primary) 0%, #6366f1 50%, #8b5cf6 100%);
  border-radius: var(--radius-xl);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  color: white;
  margin-bottom: var(--space-xl);
  box-shadow: var(--shadow-lg), 0 0 60px rgba(139, 92, 246, 0.4);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: var(--shadow-lg), 0 0 40px rgba(139, 92, 246, 0.3); }
  50% { box-shadow: var(--shadow-lg), 0 0 60px rgba(139, 92, 246, 0.5); }
}

.welcome-title {
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.5px;
  margin-bottom: var(--space-sm);
  background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.welcome-subtitle {
  font-size: 15px;
  color: var(--text-tertiary);
  margin-bottom: var(--space-3xl);
}

.suggestion-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-md);
  max-width: 500px;
}

.suggestion-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  text-align: left;
  cursor: pointer;
  transition: all 0.2s var(--ease-out);
}

.suggestion-card:hover {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  transform: translateY(-2px);
}

.suggestion-card-title {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
  color: var(--text-primary);
}

.suggestion-card-desc {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* Message Bubble */
.message {
  display: flex;
  gap: var(--space-lg);
  margin-bottom: var(--space-xl);
  animation: messageIn 0.3s var(--ease-out);
}

@keyframes messageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  flex-direction: row-reverse;
}

.message-avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 600;
}

.message.ai .message-avatar {
  background: linear-gradient(135deg, var(--accent-primary), #6366f1);
  color: white;
  box-shadow: var(--shadow-sm), 0 0 15px rgba(139, 92, 246, 0.3);
}

.message.user .message-avatar {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}

.message-content {
  max-width: 70%;
}

.message-bubble {
  padding: var(--space-lg) var(--space-xl);
  border-radius: var(--radius-lg);
  font-size: 14px;
  line-height: 1.6;
  position: relative;
}

.message.ai .message-bubble {
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-top-left-radius: 4px;
}

.message.user .message-bubble {
  background: linear-gradient(135deg, var(--accent-primary), #6366f1);
  color: white;
  border-top-right-radius: 4px;
}

.message-time {
  font-size: 11px;
  color: var(--text-disabled);
  margin-top: var(--space-sm);
  padding: 0 var(--space-xs);
}

.message.user .message-time {
  text-align: right;
}

/* ===== INPUT AREA ===== */
.input-area {
  padding: var(--space-lg) var(--space-2xl) var(--space-2xl);
  border-top: 1px solid var(--border-subtle);
  background: linear-gradient(180deg, transparent 0%, rgba(15,15,16,0.5) 100%);
}

.input-wrapper {
  display: flex;
  gap: var(--space-md);
  align-items: flex-end;
}

.input-container {
  flex: 1;
  display: flex;
  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-xl);
  background: var(--bg-secondary);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-xl);
  transition: all 0.2s var(--ease-out);
}

.input-container:focus-within {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15), var(--shadow-md);
}

.input-field {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text-primary);
  line-height: 1.5;
}

.input-field::placeholder {
  color: var(--text-tertiary);
}

.input-actions {
  display: flex;
  gap: var(--space-xs);
}

.input-action-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--text-tertiary);
  font-size: 16px;
  cursor: pointer;
  transition: all 0.15s;
}

.input-action-btn:hover {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}

.send-btn {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--accent-primary), #6366f1);
  border: none;
  border-radius: var(--radius-md);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--ease-out);
  box-shadow: var(--shadow-sm), 0 0 15px rgba(139, 92, 246, 0.3);
}

.send-btn:hover {
  transform: scale(1.05);
  box-shadow: var(--shadow-md), 0 0 25px rgba(139, 92, 246, 0.4);
}

.send-btn:active {
  transform: scale(0.95);
}

/* Quick Hints */
.quick-hints {
  display: flex;
  gap: var(--space-sm);
  margin-top: var(--space-md);
}

.hint-btn {
  padding: var(--space-sm) var(--space-md);
  background: var(--bg-secondary);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text-tertiary);
  cursor: pointer;
  transition: all 0.15s;
}

.hint-btn:hover {
  background: var(--bg-tertiary);
  border-color: var(--border-default);
  color: var(--text-secondary);
}

/* ===== BADGE ===== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  background: linear-gradient(135deg, var(--accent-primary), #6366f1);
  border-radius: var(--radius-full);
  font-size: 10px;
  font-weight: 600;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">CP</div>
        <span class="logo-text">CodePilot</span>
      </div>
    </div>
    
    <button class="new-chat-btn">+ 新对话</button>
    
    <div class="chat-list">
      <div class="chat-item active">
        <div class="chat-item-icon">⚡</div>
        <span class="chat-item-text">优化侧边栏动画效果</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">📝</div>
        <span class="chat-item-text">分析项目架构设计</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">🔧</div>
        <span class="chat-item-text">修复登录页面 Bug</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">🎨</div>
        <span class="chat-item-text">重构 UI 组件库</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">📚</div>
        <span class="chat-item-text">学习 TypeScript 进阶</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">🐛</div>
        <span class="chat-item-text">调试 API 接口异常</span>
      </div>
      <div class="chat-item">
        <div class="chat-item-icon">🚀</div>
        <span class="chat-item-text">部署优化方案</span>
      </div>
    </div>
    
    <div class="sidebar-footer">
      <div class="model-selector">
        <div class="model-status"></div>
        <span class="model-name">Claude 3.5 Sonnet</span>
        <span class="model-arrow">▼</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <div class="top-bar">
      <h1 class="top-bar-title">智能对话</h1>
      <div class="top-bar-actions">
        <button class="top-bar-btn">⚙</button>
        <button class="top-bar-btn">☰</button>
      </div>
    </div>

    <div class="messages-area">
      <div class="welcome-container">
        <div class="welcome-icon">✨</div>
        <h2 class="welcome-title">有什么可以帮你的？</h2>
        <p class="welcome-subtitle">输入问题，AI 助手为你解答</p>
        
        <div class="suggestion-grid">
          <div class="suggestion-card">
            <div class="suggestion-card-title">📂 分析代码结构</div>
            <div class="suggestion-card-desc">帮我理解这个项目的架构</div>
          </div>
          <div class="suggestion-card">
            <div class="suggestion-card-title">🐛 调试问题</div>
            <div class="suggestion-card-desc">修复一个运行时错误</div>
          </div>
          <div class="suggestion-card">
            <div class="suggestion-card-title">🎨 优化 UI</div>
            <div class="suggestion-card-desc">改进按钮的交互动效</div>
          </div>
          <div class="suggestion-card">
            <div class="suggestion-card-title">📚 解释代码</div>
            <div class="suggestion-card-desc">这段代码做了什么？</div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-container">
          <input type="text" class="input-field" placeholder="输入消息让 AI 帮你...">
          <div class="input-actions">
            <button class="input-action-btn">📎</button>
            <button class="input-action-btn">🖼</button>
          </div>
        </div>
        <button class="send-btn">↑</button>
      </div>
      <div class="quick-hints">
        <button class="hint-btn">@ 文件</button>
        <button class="hint-btn">@ 知识库</button>
        <button class="hint-btn">@ 终端</button>
        <button class="hint-btn">@ Git</button>
      </div>
    </div>
  </div>
</div>

</body>
