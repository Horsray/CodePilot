<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股票小组件演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
    }
    
    h1 {
      color: white;
      margin-bottom: 20px;
      font-size: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .widget-wrapper {
      display: inline-block;
    }
    
    .info {
      color: rgba(255,255,255,0.8);
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .info span {
      background: rgba(255,255,255,0.2);
      padding: 2px 8px;
      border-radius: 4px;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📈 股票小组件演示</h1>
    <div class="widget-wrapper">
      <!-- StockWidget will be mounted here -->
      <div id="root"></div>
    </div>
    <div class="info">
      <p>✅ 宽度: <span>290px</span></p>
      <p>✅ 单条行情显示</p>
      <p>✅ 点击输入股票代码查询</p>
      <p>✅ 每 <span>1秒</span> 自动刷新</p>
    </div>
  </div>
  
  <script type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    
    // Simplified inline version of StockWidget for demo
    function StockWidgetDemo() {
      const [code, setCode] = useState('600519');
      const [inputValue, setInputValue] = useState('600519');
      const [isEditing, setIsEditing] = useState(false);
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const inputRef = useRef(null);
      
      const fetchData = async () => {
        if (!code) return;
        try {
          const market = /^(600|601|603|688)/.test(code) ? 'sh' : 'sz';
          const response = await fetch(`https://hq.sinajs.cn/list=${market}${code}`, {
            headers: { 'Referer': 'https://finance.sina.com.cn' }
          });
          const text = await response.text();
          const match = text.match(/="([^"]+)"/);
          if (match && match[1]) {
            const parts = match[1].split(',');
            if (parts.length >= 32) {
              const price = parseFloat(parts[3]) || 0;
              const yclose = parseFloat(parts[2]) || 0;
              const change = price - yclose;
              const changePercent = yclose > 0 ? (change / yclose) * 100 : 0;
              setData({
                name: parts[0],
                price,
                change: parseFloat(change.toFixed(2)),
                changePercent: parseFloat(changePercent.toFixed(2)),
                open: parseFloat(parts[1]) || 0,
                high: parseFloat(parts[4]) || 0,
                low: parseFloat(parts[5]) || 0
              });
              setError(null);
            }
          }
        } catch (err) {
          setError('获取数据失败');
        } finally {
          setLoading(false);
        }
      };
      
      useEffect(() => {
        fetchData();
        const timer = setInterval(fetchData, 1000);
        return () => clearInterval(timer);
      }, [code]);
      
      useEffect(() => {
        if (isEditing && inputRef.current) {
          inputRef.current.focus();
        }
      }, [isEditing]);
      
      const handleSubmit = (e) => {
        e.preventDefault();
        const trimmed = inputValue.trim();
        if (/^\d{6}$/.test(trimmed)) {
          setCode(trimmed);
          setIsEditing(false);
        }
      };
      
      const getColor = () => data?.change >= 0 ? '#ef4444' : '#22c55e';
      const getSign = () => data?.change >= 0 ? '+' : '';
      
      return (
        React.createElement('div', {
          onClick: () => { setIsEditing(true); setInputValue(code); },
          style: {
            width: '290px',
            padding: '12px',
            border: '1px solid #e5e7eb',
            borderRadius: '12px',
            backgroundColor: '#fff',
            boxShadow: '0 4px 12px rgba(0,0,0,0.08)',
            cursor: 'pointer',
            fontFamily: 'Arial, sans-serif'
          }
        },
          isEditing ? 
            React.createElement('div', null,
              React.createElement('div', { style: { fontSize: '11px', color: '#6b7280', marginBottom: '8px' } }, '📝 输入股票代码（6位数字）'),
              React.createElement('form', { onSubmit: handleSubmit },
                React.createElement('input', {
                  ref: inputRef,
                  type: 'text',
                  value: inputValue,
                  onChange: (e) => setInputValue(e.target.value.replace(/\D/g,'').slice(0,6)),
                  placeholder: '如: 600519',
                  maxLength: 6,
                  style: {
                    width: '100%',
                    padding: '10px',
                    border: '2px solid #3b82f6',
                    borderRadius: '8px',
                    fontSize: '16px',
                    textAlign: 'center',
                    outline: 'none'
                  }
                })
              )
            ) :
            [
              React.createElement('div', { key: 'header', style: { display: 'flex', justifyContent: 'space-between', marginBottom: '8px', alignItems: 'center' } },
                React.createElement('span', { style: { fontSize: '12px', fontWeight: '600', backgroundColor: '#f3f4f6', padding: '2px 8px', borderRadius: '4px' } }, code),
                React.createElement('span', { style: { fontSize: '10px', color: '#10b981' } }, '● 实时')
              ),
              loading && !data ? 
                React.createElement('div', { key: 'loading', style: { textAlign: 'center', padding: '20px', color: '#6b7280' } }, '加载中...') :
                error && !data ?
                  React.createElement('div', { key: 'error', style: { color: '#ef4444', textAlign: 'center' } }, error) :
                  data && [
                    React.createElement('div', { key: 'name', style: { fontSize: '16px', fontWeight: '600', marginBottom: '4px' } }, data.name),
                    React.createElement('div', { key: 'price', style: { fontSize: '28px', fontWeight: '700', color: getColor() } }, 
                      '¥' + data.price.toFixed(2)
                    ),
                    React.createElement('div', { key: 'change', style: { fontSize: '13px', color: getColor(), marginBottom: '8px' } },
                      getSign() + data.change.toFixed(2) + ' ' + getSign() + data.changePercent.toFixed(2) + '%'
                    ),
                    React.createElement('div', { key: 'details', style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px', paddingTop: '8px', borderTop: '1px solid #f3f4f6', fontSize: '11px', color: '#6b7280' } },
                      React.createElement('div', null, 
                        React.createElement('div', null, '开盘'),
                        React.createElement('div', { style: { fontWeight: '500', color: '#374151' } }, data.open.toFixed(2))
                      ),
                      React.createElement('div', null, 
                        React.createElement('div', null, '最高'),
                        React.createElement('div', { style: { fontWeight: '500', color: '#374151' } }, data.high.toFixed(2))
                      ),
                      React.createElement('div', null, 
                        React.createElement('div', null, '最低'),
                        React.createElement('div', { style: { fontWeight: '500', color: '#374151' } }, data.low.toFixed(2))
                      )
                    )
                  ]
            ]
        )
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(StockWidgetDemo));
  </script>
  <script src="https://esm.sh/react@18.2.0" type="module"></script>
  <script src="https://esm.sh/react-dom@18.2.0/client" type="module"></script>
</body>
</html>
